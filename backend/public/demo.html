<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BotForge Widget Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #eef2ff 0%, #f9fafb 60%, #fdf4ff 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .placeholder {
      text-align: center;
      color: #d1d5db;
      user-select: none;
    }
    .placeholder h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #e5e7eb;
    }
    .placeholder p {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="placeholder">
    <h2>Your website</h2>
    <p>The chat widget appears in the bottom-right corner</p>
  </div>
  <script>
    (function () {
      var botId = new URLSearchParams(window.location.search).get('botId');
      if (!botId) return;
      var s = document.createElement('script');
      s.src = '/widget.js';
      s.setAttribute('data-bot-id', botId);
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
