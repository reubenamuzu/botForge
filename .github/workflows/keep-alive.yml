name: Keep Alive

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:           # allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          curl -f -s -o /dev/null -w "Status: %{http_code}" \
            https://botforge-iidx.onrender.com/health || true
